services:
  db:
    image: postgres:15-alpine
    container_name: messanger_db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messanger_network

  flyway:
    image: flyway/flyway:10-alpine
    container_name: messanger_flyway
    volumes:
      - ./migrations:/flyway/sql
    command: -url=jdbc:postgresql://db:5432/${DB_NAME} -user=${DB_USER} -password=${DB_PASSWORD} migrate
    depends_on:
      db:
        condition: service_healthy
    networks:
      - messanger_network

  backend:
    build:
      context: ./messanger.Server
      dockerfile: Messanger.WebApi/Dockerfile
    container_name: messanger_backend
    ports:
      - "5000:80"
      - "9222:9222"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    volumes:
      - ./messanger.Server/Messanger.WebApi:/app/Messanger.WebApi:delegated
      - ./messanger.Server/Modules:/app/Modules:delegated
      - ./messanger.Server/Core:/app/Core:delegated
      - /app/Messanger.WebApi/bin
      - /app/Messanger.WebApi/obj
      - /app/Core/Core.WebApi/bin
      - /app/Core/Core.WebApi/obj
      - /app/Core/Core.Logic/bin
      - /app/Core/Core.Logic/obj
      - /app/Core/Core.Data/bin
      - /app/Core/Core.Data/obj
      - /app/Core/Core.Dto/bin
      - /app/Core/Core.Dto/obj
      - /app/Modules/Notes/Notes.WebApi/bin
      - /app/Modules/Notes/Notes.WebApi/obj
      - /app/Modules/Notes/Notes.Logic/bin
      - /app/Modules/Notes/Notes.Logic/obj
      - /app/Modules/Notes/Notes.Data/bin
      - /app/Modules/Notes/Notes.Data/obj
      - /app/Modules/Notes/Notes.Dto/bin
      - /app/Modules/Notes/Notes.Dto/obj
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    networks:
      - messanger_network

  frontend:
    build:
      context: ./messanger.client
      dockerfile: Dockerfile
    container_name: messanger_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://backend:80
    volumes:
      - ./messanger.client:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - messanger_network

networks:
  messanger_network:
    driver: bridge

volumes:
  postgres_data: