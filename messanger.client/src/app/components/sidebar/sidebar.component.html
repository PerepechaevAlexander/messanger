<!-- Мобильный оверлей -->
<div class="overlay"
     [class.mobile-overlay]="isMobile && isSidebarOpen"
     *ngIf="isSidebarOpen"
     (click)="onOverlayClick($event)">
</div>

<!-- Сайдбар -->
<div class="sidebar"
     [class.collapsed]="!isMobile && !isSidebarOpen"
     [class.mobile-open]="isMobile && isSidebarOpen"
     [class.mobile-closed]="isMobile && !isSidebarOpen">

  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of menuItems"
          [class.active]="item.route === activeRoute"
          (click)="navigateTo(item.route)">
        <div class="menu-item-container">
          <span class="menu-icon">{{ item.icon }}</span>
          <div class="menu-label-wrapper" [class.hidden]="!isSidebarOpen && !isMobile">
            <span class="menu-label">{{ item.label }}</span>
          </div>
        </div>
      </li>
    </ul>
  </nav>

</div>
