<!-- Мобильный оверлей -->
<div class="mobile-overlay"
     *ngIf="isMobile && mobileMenuOpen"
     (click)="onOverlayClick($event)">
</div>

<!-- Сайдбар -->
<div class="sidebar"
     [class.collapsed]="!isMobile && isCollapsed"
     [class.mobile-open]="isMobile && mobileMenuOpen"
     [class.mobile-closed]="isMobile && !mobileMenuOpen">

  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of menuItems"
          [class.active]="item.route === activeRoute"
          (click)="navigateTo(item.route)">
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label" *ngIf="!isCollapsed || (isMobile && mobileMenuOpen)">{{ item.label }}</span>
      </li>
    </ul>
  </nav>

</div>
