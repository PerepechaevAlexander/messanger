<div class="toolbar" [class.sidebar-collapsed]="isSidebarCollapsed">

  <!-- Левая часть тулбара -->
  <div class="toolbar-left">
    <button class="menu-btn mobile-menu-btn"
            *ngIf="isMobile"
            (click)="openSidebar()"
            title="Открыть меню">
      <span class="menu-icon">☰</span>
    </button>
    <!-- Кнопка сворачивания слева (только для десктопа) -->
    <button class="toggle-btn"
            *ngIf="!isMobile"
            (click)="openSidebar()"
            [title]="isSidebarCollapsed ? 'Развернуть' : 'Свернуть'">
      <span class="toggle-icon">{{ isSidebarCollapsed ? '›' : '‹' }}</span>
    </button>

    <h1 class="page-title">{{ currentPageTitle }}</h1>
  </div>

  <!-- Правая часть тулбара -->
  <div class="toolbar-right">
    <button class="toolbar-add-btn"
            *ngIf="showAddButton && !isMobile"
            (click)="onCreateNote()"
            title="Создать заметку">
      <span class="plus-icon">+</span>
    </button>
  </div>

</div>
